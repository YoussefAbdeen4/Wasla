<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="dashboard_title">لوحة تحكم المندوب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="agent-app">
    <!-- القائمة الجانبية -->
    <aside class="agent-sidebar">
        <div class="agent-sidebar-header">
            <a href="dashboard.html" class="agent-logo">
                <i class="fa-solid fa-truck-fast"></i>
                <span>وصلة</span>
            </a>
        </div>
        <nav class="agent-nav">
            <a href="dashboard.html" class="agent-nav-item active">
                <i class="fa-solid fa-chart-line"></i> <span data-i18n="dashboard">لوحة التحكم</span>
            </a>
            <a href="my-orders.html" class="agent-nav-item">
                <i class="fa-solid fa-box"></i> <span data-i18n="my_orders">طلباتي</span>
            </a>
            <a href="my-financials.html" class="agent-nav-item">
                <i class="fa-solid fa-wallet"></i> <span data-i18n="my_financials">مالياتي</span>
            </a>
            <a href="profile.html" class="agent-nav-item">
                <i class="fa-solid fa-user"></i> <span data-i18n="profile">بروفايلي</span>
            </a>
        </nav>
        <div class="agent-sidebar-footer">
            <a href="#" class="agent-nav-item agent-logout">
                <i class="fa-solid fa-right-from-bracket"></i> <span data-i18n="logout">تسجيل خروج</span>
            </a>
        </div>
    </aside>

    <!-- المحتوى الرئيسي -->
    <main class="agent-main">
        <header class="agent-header">
            <div class="agent-header-left">
                <button class="agent-toggle-btn"><i class="fa-solid fa-bars"></i></button>
                <h2 class="agent-page-title" data-i18n="dashboard">لوحة التحكم</h2>
            </div>
            <div class="agent-header-right">
                <!-- أزرار تغيير اللغة -->
                <div class="agent-lang-switcher">
                    <button class="agent-lang-btn" data-lang="en">EN</button>
                    <button class="agent-lang-btn active" data-lang="ar">AR</button>
                </div>
                <div class="agent-user-profile">
                    <div class="agent-user-info">
                        <span class="agent-user-name" id="agentName">مندوب</span>
                        <span class="agent-user-role" data-i18n="role_agent">مندوب توصيل</span>
                    </div>
                    <div class="agent-avatar" id="agentAvatar">م</div>
                </div>
            </div>
        </header>

        <div class="agent-content">
            <!-- 6 بطاقات إحصائيات -->
            <div class="agent-stats-grid">
                <div class="agent-stat-card">
                    <div class="agent-stat-icon"><i class="fa-solid fa-truck"></i></div>
                    <div class="agent-stat-info">
                        <span class="agent-stat-label" data-i18n="total_orders">إجمالي الطلبات</span>
                        <span class="agent-stat-value" id="statTotal">0</span>
                    </div>
                </div>
                <div class="agent-stat-card">
                    <div class="agent-stat-icon"><i class="fa-solid fa-check-circle"></i></div>
                    <div class="agent-stat-info">
                        <span class="agent-stat-label" data-i18n="delivered">تم التوصيل</span>
                        <span class="agent-stat-value" id="statDelivered">0</span>
                    </div>
                </div>
                <div class="agent-stat-card">
                    <div class="agent-stat-icon"><i class="fa-solid fa-undo"></i></div>
                    <div class="agent-stat-info">
                        <span class="agent-stat-label" data-i18n="returned">مرتجع</span>
                        <span class="agent-stat-value" id="statReturned">0</span>
                    </div>
                </div>
                <div class="agent-stat-card">
                    <div class="agent-stat-icon"><i class="fa-solid fa-coins"></i></div>
                    <div class="agent-stat-info">
                        <span class="agent-stat-label" data-i18n="cash_in_hand">النقدية معي</span>
                        <span class="agent-stat-value" id="statCashInHand">0 E.G</span>
                    </div>
                </div>
                <div class="agent-stat-card">
                    <div class="agent-stat-icon"><i class="fa-solid fa-building"></i></div>
                    <div class="agent-stat-info">
                        <span class="agent-stat-label" data-i18n="cash_delivered">سلمت للشركة</span>
                        <span class="agent-stat-value" id="statCashDelivered">0 E.G</span>
                    </div>
                </div>
                <div class="agent-stat-card">
                    <div class="agent-stat-icon"><i class="fa-solid fa-scale-balanced"></i></div>
                    <div class="agent-stat-info">
                        <span class="agent-stat-label" data-i18n="balance">الرصيد المتبقي</span>
                        <span class="agent-stat-value" id="statBalance">0 E.G</span>
                    </div>
                </div>
            </div>

            <!-- أحدث الطلبات -->
            <div class="agent-card">
                <div class="agent-card-header">
                    <h3 class="agent-card-title"><i class="fa-solid fa-clock-rotate-left"></i> <span data-i18n="recent_orders">أحدث الطلبات</span></h3>
                </div>
                <div class="agent-table-container">
                    <table class="agent-table">
                        <thead>
                            <tr>
                                <th data-i18n="order_no">رقم الطلب</th>
                                <th data-i18n="customer">العميل</th>
                                <th data-i18n="amount">المبلغ</th>
                                <th data-i18n="status">الحالة</th>
                            </tr>
                        </thead>
                        <tbody id="recentOrdersBody">
                            <tr><td colspan="4" style="text-align:center;">جاري التحميل...<\/td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="agent.js"></script>
</body>
</html>
